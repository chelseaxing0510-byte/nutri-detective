<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Green Drink Incident</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
radial-gradient(circle at top,#111111 0%,#050505 40%,#000000 100%);

overflow:hidden;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:'Inter',sans-serif;

color:white;

}

/* Animated Background */

body::before{

content:"";

position:fixed;

width:200%;
height:200%;

background:
radial-gradient(circle,
rgba(255,0,0,0.03) 0%,
transparent 60%);

animation:fogMove 25s linear infinite;

z-index:-3;

}

/* CRT Scanlines */

body::after{

content:"";

position:fixed;

width:100%;
height:100%;

background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 1px,
transparent 3px
);

pointer-events:none;

mix-blend-mode:overlay;

z-index:999;

}

@keyframes fogMove{

0%{
transform:translate(-10%,-10%);
}

50%{
transform:translate(-5%,-15%);
}

100%{
transform:translate(-10%,-10%);
}

}

/* Main Window */

.container{

width:92%;
max-width:1350px;

height:92vh;

background:
linear-gradient(
to bottom,
rgba(20,20,20,0.98),
rgba(5,5,5,0.98)
);

border:1px solid #222;

border-radius:30px;

overflow:hidden;

display:flex;

box-shadow:
0 0 60px rgba(0,0,0,0.95),
0 0 120px rgba(255,0,0,0.05);

animation:fadeIn 2s;

}

/* Sidebar */

.sidebar{

width:300px;

background:
linear-gradient(
to bottom,
#050505,
#0a0a0a
);

border-right:1px solid #1f1f1f;

padding:35px;

position:relative;

}

.sidebar::after{

content:"";

position:absolute;

top:0;
right:0;

width:1px;
height:100%;

background:
linear-gradient(
to bottom,
transparent,
#4ade80,
transparent
);

opacity:0.4;

}

.logo{

font-family:'Share Tech Mono',monospace;

font-size:34px;

color:#4ade80;

line-height:1.2;

margin-bottom:45px;

text-shadow:
0 0 10px #4ade80,
0 0 20px rgba(74,222,128,0.5);

letter-spacing:2px;

}

/* Files */

.case-file{

padding:15px;

margin-bottom:12px;

border:1px solid #222;

border-radius:12px;

background:#0b0b0b;

color:#777;

transition:0.3s;

font-size:15px;

}

.case-file.active{

background:#111827;

border-color:#4ade80;

color:white;

box-shadow:
0 0 20px rgba(74,222,128,0.15);

transform:translateX(5px);

}

/* Main Content */

.main{

flex:1;

padding:50px;

overflow-y:auto;

position:relative;

}

/* Red Glow */

.main::before{

content:"";

position:absolute;

top:-100px;
right:-100px;

width:400px;
height:400px;

background:
radial-gradient(circle,
rgba(255,0,0,0.08),
transparent 70%);

pointer-events:none;

}

/* Progress */

.progress{

font-family:'Share Tech Mono',monospace;

color:#666;

font-size:14px;

letter-spacing:3px;

margin-bottom:20px;

}

/* Titles */

.step-title{

font-size:48px;

font-weight:700;

color:#f87171;

margin-bottom:30px;

text-shadow:
0 0 10px rgba(248,113,113,0.4);

animation:fadeIn 1s;

}

/* Story */

.story{

font-size:22px;

line-height:2.1;

white-space:pre-line;

color:#e5e5e5;

min-height:300px;

animation:fadeIn 1s;

}

/* Evidence Image */

.evidence{

margin-top:30px;

margin-bottom:30px;

width:100%;

max-width:700px;

border-radius:20px;

border:1px solid #333;

box-shadow:
0 0 25px rgba(0,0,0,0.8);

filter:
brightness(0.85)
contrast(1.1);

}

/* Question */

.question-box{

margin-top:40px;

padding:28px;

background:#050505;

border:1px solid #222;

border-radius:22px;

animation:fadeIn 1s;

}

.question-title{

font-family:'Share Tech Mono',monospace;

font-size:30px;

color:#fde047;

margin-bottom:20px;

}

/* Buttons */

.option{

width:100%;

padding:18px;

margin-top:15px;

background:#111;

border:1px solid #333;

border-radius:14px;

color:white;

font-size:18px;

cursor:pointer;

transition:0.25s;

position:relative;

overflow:hidden;

}

.option:hover{

background:#181818;

border-color:#4ade80;

transform:scale(1.01);

}

.option:hover::after{

content:"";

position:absolute;

left:-100%;
top:0;

width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.08),
transparent
);

animation:shine 1s;

}

.correct{

background:#14532d !important;

border-color:#4ade80 !important;

}

.wrong{

background:#7f1d1d !important;

border-color:#ef4444 !important;

animation:shake 0.25s 2;

}

/* Continue */

.continue-btn{

margin-top:30px;

padding:18px 35px;

background:#4ade80;

color:black;

border:none;

border-radius:14px;

font-size:20px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

animation:pulse 2s infinite;

}

.continue-btn:hover{

transform:scale(1.05);

}

/* Messages */

.message{

margin-top:25px;

padding:22px;

border-radius:18px;

line-height:1.9;

white-space:pre-line;

font-size:18px;

animation:fadeIn 1s;

}

.success{

background:#052e16;

border:1px solid #4ade80;

}

.error{

background:#450a0a;

border:1px solid #ef4444;

}

/* Cursor */

.cursor{

display:inline-block;

width:10px;

height:24px;

background:#4ade80;

margin-left:5px;

animation:blink 1s infinite;

}

/* Animations */

@keyframes blink{

0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}

}

@keyframes pulse{

0%{
box-shadow:0 0 5px #4ade80;
}

50%{
box-shadow:0 0 25px #4ade80;
}

100%{
box-shadow:0 0 5px #4ade80;
}

}

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(-4px);}
50%{transform:translateX(4px);}
75%{transform:translateX(-4px);}
100%{transform:translateX(0);}

}

@keyframes shine{

from{
left:-100%;
}

to{
left:100%;
}

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
CASE<br>
FILES
</div>

<div id="sidebarList"></div>

</div>

<div class="main">

<div class="progress" id="progress"></div>

<div class="step-title" id="title"></div>

<div class="story" id="story"></div>

<img id="evidenceImage" class="evidence" src="" style="display:none;">

<div id="questionArea"></div>

</div>

</div>

<script>

const steps = [

{
title:"Opening",

image:"https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=1400",

content:
`9:36 PM — backstage of the school's Environmental Club Healthy Eating Expo.

Anthony suddenly collapsed onto the floor.

His face turned pale.

"It feels like knives are scraping inside me..."

A half-finished green smoothie sat silently beside him.`

},

{
title:"Step 1 — Crime Scene",

image:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=1400",

content:
`Evidence discovered backstage:

• Green smoothie
• Almonds
• Dark chocolate
• Empty spinach bags

Everything appears healthy...

So why did Anthony collapse?`,

question:{

text:
"What can detectives conclude?",

options:[
"A. Food poisoning",
"B. Poisoning",
"C. Stomach flu",
"D. More evidence is needed"
],

answer:3,

explanation:
`Detectives must never jump to conclusions too early.`

}

},

{
title:"Step 2 — Symptom Clues",

image:"https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1400",

content:
`Hospital records:

• Severe side pain
• Blood in urine
• No fever
• No outbreak among students`

,

question:{

text:
"What does this resemble most?",

options:[
"A. Food poisoning",
"B. Kidney stones",
"C. Allergy",
"D. Stomach flu"
],

answer:1,

explanation:
`The symptoms point toward urinary system issues.`

}

},

{
title:"Final Revelation",

image:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?q=80&w=1400",

content:
`CT scans revealed calcium oxalate kidney stones.

Anthony's obsession with "healthy smoothies"
slowly became dangerous.`

},

{
title:"Key Takeaways",

image:"https://images.unsplash.com/photo-1498837167922-ddd27525d352?q=80&w=1400",

content:
`• Healthy food still depends on dosage.

• Smoothies can hide massive intake amounts.

• Hydration matters.

• Nutrition is about balance.`

}

];

let currentStep = 0;

/* Sidebar */

function updateSidebar(){

const list =
document.getElementById("sidebarList");

list.innerHTML = "";

for(let i=0;i<steps.length;i++){

const item =
document.createElement("div");

item.className = "case-file";

if(i === currentStep){

item.classList.add("active");

}

item.innerHTML =
steps[i].title;

list.appendChild(item);

}

}

/* Typewriter */

function typeWriter(text, element, speed=18){

element.innerHTML = "";

let i = 0;

function typing(){

if(i < text.length){

element.innerHTML += text.charAt(i);

i++;

setTimeout(typing,speed);

}else{

element.innerHTML +=
'<span class="cursor"></span>';

}

}

typing();

}

/* Render */

function renderStep(){

updateSidebar();

const step = steps[currentStep];

document.getElementById("progress").innerHTML =
"CASE PROGRESS — " +
(currentStep + 1) +
" / " +
steps.length;

document.getElementById("title").innerHTML =
step.title;

typeWriter(
step.content,
document.getElementById("story")
);

/* Image */

const img =
document.getElementById("evidenceImage");

if(step.image){

img.style.display = "block";

img.src = step.image;

}else{

img.style.display = "none";

}

/* Questions */

const area =
document.getElementById("questionArea");

area.innerHTML = "";

if(!step.question){

const btn =
document.createElement("button");

btn.className =
"continue-btn";

if(currentStep === steps.length - 1){

btn.innerHTML =
"RESUME CASE";

}else{

btn.innerHTML =
"CONTINUE";

}

btn.onclick = function(){

if(currentStep === steps.length - 1){

currentStep = 0;

}else{

currentStep++;

}

renderStep();

};

area.appendChild(btn);

return;

}

const box =
document.createElement("div");

box.className =
"question-box";

const qTitle =
document.createElement("div");

qTitle.className =
"question-title";

qTitle.innerHTML =
"QUESTION";

box.appendChild(qTitle);

const qText =
document.createElement("div");

qText.innerHTML =
step.question.text;

qText.style.marginBottom =
"20px";

box.appendChild(qText);

for(let i=0;i<step.question.options.length;i++){

const option =
document.createElement("button");

option.className =
"option";

option.innerHTML =
step.question.options[i];

option.onclick =
function(){

if(i === step.question.answer){

option.classList.add("correct");

area.innerHTML = "";

const success =
document.createElement("div");

success.className =
"message success";

success.innerHTML =
"KNOWLEDGE UNLOCKED<br><br>" +
step.question.explanation;

const continueBtn =
document.createElement("button");

continueBtn.className =
"continue-btn";

continueBtn.innerHTML =
"CONTINUE";

continueBtn.onclick =
function(){

currentStep++;

renderStep();

};

area.appendChild(success);

area.appendChild(continueBtn);

}else{

option.classList.add("wrong");

const error =
document.createElement("div");

error.className =
"message error";

error.innerHTML =
"Incorrect deduction. Re-examine the evidence carefully.";

area.appendChild(error);

}

};

box.appendChild(option);

}

area.appendChild(box);

}

renderStep();

</script>

</body>
</html>
